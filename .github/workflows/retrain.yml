name: Automated UFC Model Retraining

on:
  schedule:
    # Runs every Sunday at 08:00 UTC (after Saturday night fights)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # Fetch full history so we can commit back to the repo
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install kagglehub pandas

      - name: Download Latest Dataset from Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python -c "
          import kagglehub
          import shutil
          import os
          
          print('Downloading dataset via kagglehub...')
          # kagglehub automatically uses the KAGGLE_API_TOKEN environment variable
          path = kagglehub.dataset_download('mdabbert/ultimate-ufc-dataset')
          
          source_csv = os.path.join(path, 'ufc-master.csv')
          dest_csv = 'data/raw/original/ufc-master.csv'
          
          # Ensure destination directory exists
          os.makedirs(os.path.dirname(dest_csv), exist_ok=True)
          
          shutil.copy2(source_csv, dest_csv)
          print('Successfully downloaded and copied to:', dest_csv)
          "

      - name: Retrain XGBoost Model
        run: |
          # Set python path so modules in src/ resolve correctly
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          echo "Processing features from raw data..."
          python src/data/save_processed_data.py
          
          echo "Training the model on the latest data..."
          python src/models/train_xgboost.py
          echo "Training complete!"

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the updated files (using -f to force add them if they are in .gitignore)
          git add -f data/raw/original/ufc-master.csv
          git add -f data/processed/ufc-ml-features.csv || true
          git add -f models/xgboost_model.pkl
          git add -f mlflow.db || true  # Ignore if mlflow.db doesn't exist
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new data or model changes to commit."
            exit 0
          fi
          
          git commit -m "Auto-Update: Retrained model with latest UFC data [skip ci]"
          git push
