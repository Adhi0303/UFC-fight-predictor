services:
  # FastAPI Backend Service
  - type: web
    name: ufc-predictor-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd web_app/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: ODDS_API_KEY
        sync: false
      - key: KAGGLE_API_TOKEN
        sync: false
    healthCheckPath: /
    autoDeploy: true
    
  # React Frontend Service
  - type: web
    name: ufc-predictor-frontend
    runtime: node
    buildCommand: "cd web_app/frontend && npm install && npm run build"
    startCommand: "cd web_app/frontend && npm run preview -- --host 0.0.0.0 --port $PORT"
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_URL
        fromService:
          type: web
          name: ufc-predictor-backend
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: true
